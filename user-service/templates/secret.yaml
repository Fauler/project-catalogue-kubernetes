apiVersion: v1
kind: Secret
metadata:
  name: {{ include "user-service.fullname" . }}
  labels:
    {{- include "user-service.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ .Values.secret.jwtSecret | b64enc | quote }}
  SPRING_DATASOURCE_URL: {{ .Values.secret.dbUrl | b64enc | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.secret.dbUsername | b64enc | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.secret.dbPassword | b64enc | quote }}
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: {{ "org.postgresql.Driver" | b64enc | quote }}

