apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: "1"
  name: catalogue-dashboard-{{ .Values.environment }}
  namespace: {{ .Values.namespace }}
data:
  catalogue-dashboard.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "HTTP Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum by(uri, method) (rate(http_server_requests_seconds_count{namespace=\"{{ .Values.namespace }}\"}[5m]))",
              "legendFormat": "{{ "{{method}}" }} {{ "{{uri}}" }}",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "HTTP Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum by(uri) (rate(http_server_requests_seconds_count{namespace=\"{{ .Values.namespace }}\", status=~\"5..\"}[5m]))",
              "legendFormat": "{{ "{{uri}}" }}",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "color": { "mode": "fixed", "fixedColor": "red" }
            }
          }
        },
        {
          "title": "Response Time p95",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by(le, uri) (rate(http_server_requests_seconds_bucket{namespace=\"{{ .Values.namespace }}\"}[5m])))",
              "legendFormat": "{{ "{{uri}}" }}",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Response Time p50",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by(le, uri) (rate(http_server_requests_seconds_bucket{namespace=\"{{ .Values.namespace }}\"}[5m])))",
              "legendFormat": "{{ "{{uri}}" }}",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "JVM Heap Used",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{namespace=\"{{ .Values.namespace }}\", area=\"heap\"} / 1024 / 1024",
              "legendFormat": "{{ "{{pod}}" }}",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "JVM GC Pause Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "rate(jvm_gc_pause_seconds_sum{namespace=\"{{ .Values.namespace }}\"}[5m]) / rate(jvm_gc_pause_seconds_count{namespace=\"{{ .Values.namespace }}\"}[5m])",
              "legendFormat": "{{ "{{pod}}" }} {{ "{{cause}}" }}",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Pod Restarts",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "targets": [
            {
              "expr": "sum by(pod) (increase(kube_pod_container_status_restarts_total{namespace=\"{{ .Values.namespace }}\"}[1h]))",
              "legendFormat": "{{ "{{pod}}" }}",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "bars", "fillOpacity": 50 }
            }
          }
        },
        {
          "title": "CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"{{ .Values.namespace }}\", container!=\"\"}[5m])",
              "legendFormat": "{{ "{{pod}}" }}",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["catalogue", "{{ .Values.environment }}"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Project Catalogue - {{ .Values.environment }}",
      "uid": "catalogue-{{ .Values.environment }}"
    }

