apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: high-server-error-rate-{{ .Values.environment }}
  namespace: {{ .Values.namespace }}
spec:
  groups:
    - name: catalogue-http-errors
      rules:
        - alert: HighServerErrorRate
          expr: |
            sum(increase(http_server_requests_seconds_count{
              namespace="{{ .Values.namespace }}",
              status=~"5.."
            }[5m])) > 10
          for: 2m
          annotations:
            summary: "More than 10 HTTP 5xx errors in the last 5 minutes"
          labels:
            severity: warning
            environment: {{ .Values.environment }}

