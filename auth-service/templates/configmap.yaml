apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "auth-service.fullname" . }}
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.config.springProfile | default "dev" | quote }}
  USER_SERVICE_URL: {{ .Values.config.userServiceUrl | quote }}
  JWT_EXPIRATION_MS: {{ .Values.config.jwtExpirationMs | quote }}
  ALLOWED_CLIENT_IDS: {{ .Values.config.allowedClientIds | quote }}
  ADMIN_CLIENT_IDS: {{ .Values.config.adminClientIds | quote }}
  MANAGEMENT_OTLP_TRACING_ENDPOINT: {{ .Values.config.otlpEndpoint | default "http://tempo.monitoring.svc.cluster.local:4318/v1/traces" | quote }}

