replicaCount: 1

image:
  repository: project-catalogue-auth-service
  tag: latest
  pullPolicy: Never

containerPort: 8083

service:
  port: 8083

probes:
  path: /actuator/health

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

serviceAccount:
  create: true

serviceMonitor:
  enabled: true
  path: /actuator/prometheus
  interval: 15s

config:
  springProfile: dev
  userServiceUrl: http://user-service.catalogue-dev.svc.cluster.local:8081
  jwtExpirationMs: "86400000"
  allowedClientIds: "client-user-01,client-admin-01"
  adminClientIds: "client-admin-01"

secret:
  jwtSecret: bXktc3VwZXItc2VjcmV0LWtleS1mb3ItZGV2LWVudmlyb25tZW50LTEyMzQ1Njc4OQ==

