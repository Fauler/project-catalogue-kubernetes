replicaCount: 2

image:
  repository: project-catalogue-auth-service
  tag: latest
  pullPolicy: Never

containerPort: 8083

service:
  port: 8083

probes:
  path: /actuator/health

resources:
  requests:
    cpu: 150m
    memory: 384Mi
  limits:
    cpu: 750m
    memory: 768Mi

serviceAccount:
  create: true

serviceMonitor:
  enabled: true
  path: /actuator/prometheus
  interval: 15s

config:
  springProfile: prod
  userServiceUrl: http://user-service-prod.catalogue-prod.svc.cluster.local:8081
  jwtExpirationMs: "120000"
  allowedClientIds: "client-user-01,client-admin-01"
  adminClientIds: "client-admin-01"

secret:
  jwtSecret: bXktand0U2VjcmV0LWZvci1wcm9kLWVudmlyb25tZW50LXBvcnR1Z2FsLWxpc2JvYS0yMDI2

